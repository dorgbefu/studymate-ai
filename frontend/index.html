<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }
        .new-chat-btn {
            margin: 16px;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .chat-item {
            padding: 12px 16px;
            margin: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-item:hover, .chat-item.active {
            background: #f1f5f9;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            cursor: pointer;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: #6366f1;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* MAIN CHAT AREA */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 16px 24px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 20px;
            line-height: 1.5;
        }
        .user {
            align-self: flex-end;
            background: #6366f1;
            color: white;
            border-bottom-right-radius: 6px;
        }
        .ai {
            align-self: flex-start;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-bottom-left-radius: 6px;
        }

        .input-area {
            padding: 20px 24px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        .input-box {
            display: flex;
            gap: 12px;
            background: #f1f5f9;
            border-radius: 9999px;
            padding: 8px;
        }
        input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 20px;
            font-size: 1.05rem;
            outline: none;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <span class="logo">📚</span>
            <h2>StudyMate AI</h2>
        </div>

        <button class="new-chat-btn" onclick="newChat()">
            <i class="fas fa-plus"></i> New Chat
        </button>

        <div class="chat-list" id="chatList">
            <!-- Chat items will be added by JavaScript -->
        </div>

        <div class="sidebar-footer">
            <div class="profile" onclick="showProfile()">
                <div class="avatar">👤</div>
                <div>
                    <strong id="username">Student</strong>
                    <small id="useremail">student@email.com</small>
                </div>
            </div>
            <i class="fas fa-sign-out-alt" onclick="logout()" style="cursor:pointer; font-size:1.4rem; color:#64748b;"></i>
        </div>
    </div>

    <!-- MAIN CHAT -->
    <div class="main">
        <div class="chat-header">
            <strong id="currentChatTitle">New Chat</strong>
        </div>

        <div class="messages" id="messages">
            <!-- Messages appear here -->
        </div>

        <div class="input-area">
            <div class="input-box">
                <input type="text" id="question" placeholder="Ask anything..." autocomplete="off">
                <button onclick="askAI()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('chats')) || [];
        let currentChatId = null;

        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }

        function newChat() {
            const newChat = {
                id: Date.now(),
                title: "New Chat",
                messages: []
            };
            chats.unshift(newChat);
            saveChats();
            renderChatList();
            switchChat(newChat.id);
        }

        function switchChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            document.getElementById('currentChatTitle').textContent = chat.title;

            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';

            chat.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.isUser ? 'user' : 'ai'}`;
                div.textContent = msg.text;
                messagesDiv.appendChild(div);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                div.innerHTML = `
                    <i class="fas fa-comment"></i>
                    <span>${chat.title}</span>
                `;
                div.onclick = () => switchChat(chat.id);
                list.appendChild(div);
            });
        }

        async function askAI() {
            const input = document.getElementById('question');
            const question = input.value.trim();
            if (!question || !currentChatId) return;

            const chat = chats.find(c => c.id === currentChatId);
            chat.messages.push({ isUser: true, text: question });
            input.value = '';

            // Show user message
            const messagesDiv = document.getElementById('messages');
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.textContent = question;
            messagesDiv.appendChild(userMsg);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            // Show typing
            const typing = document.createElement('div');
            typing.className = 'message ai';
            typing.textContent = "Typing...";
            messagesDiv.appendChild(typing);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const res = await fetch("https://studymate-ai-yqqz.onrender.com/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question })
                });
                const data = await res.json();

                typing.remove();
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message ai';
                aiMsg.textContent = data.answer || "Sorry, no response.";
                messagesDiv.appendChild(aiMsg);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;

                chat.messages.push({ isUser: false, text: aiMsg.textContent });
                saveChats();
            } catch (e) {
                typing.textContent = "❌ Connection error";
            }
        }

        function showProfile() {
            alert("👤 User Profile\n\nName: Student\nEmail: student@email.com\n\n(Profile page coming soon)");
        }

        function logout() {
            if (confirm("Logout from StudyMate AI?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Initialize
        if (chats.length === 0) newChat();
        else switchChat(chats[0].id);

        renderChatList();

        // Press Enter to send
        document.getElementById('question').addEventListener('keypress', e => {
            if (e.key === "Enter") askAI();
        });
    </script>
</body>
</html>
