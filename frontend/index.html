<!DOCTYPE html>
<html>
<head>
    <title>StudyMate AI</title>
</head>
<body>

<h1>StudyMate AI</h1>

<input type="text" id="question" placeholder="Ask a question" size="50">
<button onclick="askAI()">Ask</button>

<p><strong>Answer:</strong></p>
<p id="answer"></p>

<script>
async function askAI() {
    const question = document.getElementById("question").value;

    try {
        const response = await fetch("https://studymate-ai-hpt6.onrender.com/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                question: question
            })
        });

        const data = await response.json();
        document.getElementById("answer").innerText = data.answer;

    } catch (error) {
        document.getElementById("answer").innerText = "Error: " + error;
        console.log(error);
    }
}
</script>

</body>
</html>
