<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate AI • Your Smart Study Buddy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e2937;
            --text-light: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            overflow-x: hidden;
        }

        .container {
            max-width: 920px;
            margin: 40px auto;
            background: var(--card);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .container:hover {
            transform: translateY(-8px);
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 48px 40px 36px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            animation: shine 8s linear infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-30%) translateY(-30%); }
            50% { transform: translateX(30%) translateY(30%); }
            100% { transform: translateX(-30%) translateY(-30%); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
            animation: fadeInDown 0.8s ease forwards;
        }

        .tagline {
            font-size: 1.15rem;
            opacity: 0.95;
            font-weight: 400;
            animation: fadeInDown 1s ease 0.2s forwards;
            opacity: 0;
        }

        .main-content {
            padding: 42px 40px;
        }

        .input-area {
            position: relative;
            margin-bottom: 32px;
        }

        input {
            width: 100%;
            padding: 20px 28px;
            font-size: 1.15rem;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
            background: #f8fafc;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 5px rgba(99, 102, 241, 0.18);
            background: white;
            transform: scale(1.02);
        }

        button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-50%) scale(1.08);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(-50%) scale(0.98);
        }

        .answer-section {
            margin-top: 10px;
        }

        .answer-box {
            background: #f8fafc;
            border-radius: 20px;
            padding: 32px;
            min-height: 220px;
            border: 2px solid #e2e8f0;
            line-height: 1.75;
            font-size: 1.12rem;
            color: var(--text);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
        }

        .answer-box.show {
            opacity: 1;
            transform: translateY(0);
        }

        .answer-box:empty::before {
            content: "Your AI study assistant is ready to help... ✨";
            color: var(--text-light);
            font-style: italic;
            display: block;
        }

        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--primary);
            font-size: 1.05rem;
            padding: 20px;
            animation: fadeIn 0.4s ease;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-light);
            font-size: 0.95rem;
            border-top: 1px solid #f1f5f9;
        }

        /* Micro interactions */
        .fade-in {
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-graduation-cap"></i> StudyMate AI</h1>
            <p class="tagline">Your intelligent study companion</p>
        </header>

        <div class="main-content">
            <div class="input-area">
                <input 
                    type="text" 
                    id="question" 
                    placeholder="Ask anything... e.g., Explain quantum entanglement in simple terms"
                    autocomplete="off"
                >
                <button onclick="askAI()">
                    <i class="fas fa-paper-plane"></i> 
                    Ask AI
                </button>
            </div>

            <div class="answer-section">
                <p style="margin-bottom: 12px; font-weight: 600; color: var(--text-light); display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-lightbulb"></i> 
                    Answer from StudyMate AI
                </p>
                
                <div class="answer-box" id="answer"></div>

                <div class="loading" id="loading">
                    <i class="fas fa-spinner spinner"></i>
                    <span>Thinking deeply...</span>
                </div>
            </div>
        </div>

        <div class="footer">
            Powered by AI • Designed for focused learning
        </div>
    </div>

    <script>
        const answerBox = document.getElementById("answer");
        const loading = document.getElementById("loading");
        const questionInput = document.getElementById("question");

        async function askAI() {
            const question = questionInput.value.trim();

            if (!question) {
                answerBox.innerHTML = `<span style="color: #ef4444;">Please enter a question to get started ✨</span>`;
                answerBox.classList.add("show");
                return;
            }

            // Reset and show loading
            answerBox.classList.remove("show");
            answerBox.innerHTML = "";
            loading.classList.add("active");

            try {
                const response = await fetch("https://studymate-ai-hpt6.onrender.com/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question })
                });

                if (!response.ok) throw new Error("Failed to get response");

                const data = await response.json();

                // Hide loading
                loading.classList.remove("active");

                // Show answer with smooth animation
                answerBox.innerHTML = data.answer || "No response received.";
                answerBox.classList.add("show");

            } catch (error) {
                loading.classList.remove("active");
                answerBox.innerHTML = `<span style="color: #ef4444;">⚠️ Sorry, I couldn't connect right now. Please try again.</span>`;
                answerBox.classList.add("show");
                console.error(error);
            }
        }

        // Enter key support
        questionInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                askAI();
            }
        });

        // Optional: Clear previous answer slightly when user starts typing again
        questionInput.addEventListener("input", () => {
            if (answerBox.classList.contains("show") && questionInput.value.length > 3) {
                answerBox.style.opacity = "0.4";
            }
        });
    </script>
</body>
</html>
