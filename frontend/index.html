<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate AI • Your Smart Study Buddy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e2937;
            --text-light: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #e0e7ff);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 40px 40px 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .tagline {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 400;
        }

        .main-content {
            padding: 40px;
        }

        .input-area {
            position: relative;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 18px 24px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            outline: none;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: white;
        }

        button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-50%) scale(1.05);
        }

        .answer-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 28px;
            min-height: 200px;
            border: 2px solid #e2e8f0;
            line-height: 1.7;
            font-size: 1.1rem;
            color: var(--text);
        }

        .answer-box:empty::before {
            content: "Your answer will appear here...";
            color: var(--text-light);
            font-style: italic;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: var(--primary);
        }

        .loading.active {
            display: block;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-light);
            font-size: 0.95rem;
            border-top: 1px solid #f1f5f9;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .main-content { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-graduation-cap"></i> StudyMate AI</h1>
            <p class="tagline">Your intelligent study companion • Ask anything</p>
        </header>

        <div class="main-content">
            <div class="input-area">
                <input 
                    type="text" 
                    id="question" 
                    placeholder="Ask me anything about your studies... (e.g., Explain photosynthesis)"
                    autocomplete="off"
                >
                <button onclick="askAI()">
                    <i class="fas fa-paper-plane"></i> Ask AI
                </button>
            </div>

            <p style="margin-bottom: 12px; font-weight: 600; color: var(--text-light);">
                <i class="fas fa-lightbulb"></i> Answer:
            </p>
            
            <div class="answer-box" id="answer"></div>

            <div class="loading" id="loading">
                <i class="fas fa-spinner fa-spin"></i> Thinking...
            </div>
        </div>

        <div class="footer">
            Powered by AI • Made for better learning
        </div>
    </div>

    <script>
        async function askAI() {
            const questionInput = document.getElementById("question");
            const answerBox = document.getElementById("answer");
            const loading = document.getElementById("loading");
            const question = questionInput.value.trim();

            if (!question) {
                answerBox.innerHTML = `<span style="color: #ef4444;">Please type a question first!</span>`;
                return;
            }

            // UI Feedback
            answerBox.style.opacity = "0.6";
            loading.classList.add("active");
            answerBox.innerText = "";

            try {
                const response = await fetch("https://studymate-ai-hpt6.onrender.com/ask", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ question: question })
                });

                if (!response.ok) throw new Error("Server error");

                const data = await response.json();
                
                // Smooth transition
                answerBox.style.transition = "opacity 0.4s";
                answerBox.style.opacity = "1";
                answerBox.innerHTML = data.answer || "No answer received.";

            } catch (error) {
                answerBox.style.opacity = "1";
                answerBox.innerHTML = `<span style="color: #ef4444;">⚠️ Error: Could not connect to StudyMate AI. Please try again.</span>`;
                console.error(error);
            } finally {
                loading.classList.remove("active");
            }
        }

        // Allow pressing Enter to ask
        document.getElementById("question").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                askAI();
            }
        });

        // Optional: Clear answer when typing new question
        document.getElementById("question").addEventListener("input", () => {
            const answerBox = document.getElementById("answer");
            if (answerBox.style.opacity === "0.6") {
                answerBox.style.opacity = "1";
            }
        });
    </script>
</body>
</html>
