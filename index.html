<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMate AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            height: 100vh;
            display: flex;
            overflow: hidden;
            color: white;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #1e2937;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            font-size: 28px;
            color: var(--primary);
        }
        .new-chat {
            margin: 16px;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .chat-item {
            padding: 14px 20px;
            margin: 4px 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .chat-item:hover, .chat-item.active {
            background: #334155;
        }
        .chat-item .title {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .chat-item .time {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* Main Chat Area */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 16px 24px;
            background: #1e2937;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
        }

        .messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 20px;
            position: relative;
            line-height: 1.6;
        }
        .user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai {
            align-self: flex-start;
            background: #334155;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .typing {
            align-self: flex-start;
            background: #334155;
            padding: 14px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 20px 24px;
            background: #1e2937;
            border-top: 1px solid #334155;
        }
        .input-box {
            display: flex;
            background: #334155;
            border-radius: 9999px;
            padding: 8px;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 16px 24px;
            font-size: 1.05rem;
            outline: none;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Profile */
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 42px;
            height: 42px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <span class="logo">📚</span>
            <h2>StudyMate AI</h2>
        </div>

        <button class="new-chat" onclick="newChat()">
            <i class="fas fa-plus"></i> New Chat
        </button>

        <div class="chat-list" id="chatList"></div>

        <div class="sidebar-footer">
            <div class="avatar">👤</div>
            <div style="flex:1">
                <strong>Student</strong><br>
                <small style="color:#94a3b8">student@email.com</small>
            </div>
            <i class="fas fa-sign-out-alt" onclick="logout()" style="cursor:pointer;font-size:1.5rem"></i>
        </div>
    </div>

    <!-- MAIN CHAT -->
    <div class="main">
        <div class="chat-header">
            <strong id="currentChatTitle">New Chat</strong>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <div class="input-box">
                <input type="text" id="question" placeholder="Type your message..." autocomplete="off">
                <button onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        let chats = JSON.parse(localStorage.getItem('chats')) || [];
        let currentChatId = null;

        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }

        function newChat() {
            const chat = {
                id: Date.now(),
                title: "New Chat",
                messages: []
            };
            chats.unshift(chat);
            saveChats();
            renderChatList();
            switchChat(chat.id);
        }

        function switchChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            document.getElementById('currentChatTitle').textContent = chat.title;

            const container = document.getElementById('messages');
            container.innerHTML = '';

            chat.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.isUser ? 'user' : 'ai'}`;
                div.textContent = msg.text;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                div.innerHTML = `<i class="fas fa-comment"></i> <span>${chat.title}</span>`;
                div.onclick = () => switchChat(chat.id);
                list.appendChild(div);
            });
        }

        async function sendMessage() {
            const input = document.getElementById('question');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            const chat = chats.find(c => c.id === currentChatId);
            chat.messages.push({ isUser: true, text: text });
            input.value = '';

            const container = document.getElementById('messages');
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.textContent = text;
            container.appendChild(userDiv);
            container.scrollTop = container.scrollHeight;

            // Typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai typing';
            typingDiv.textContent = "Thinking...";
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;

            try {
                const res = await fetch("https://studymate-ai-yqqz.onrender.com/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: text })
                });

                const data = await res.json();
                typingDiv.remove();

                const aiDiv = document.createElement('div');
                aiDiv.className = 'message ai';
                aiDiv.textContent = data.answer || "Sorry, no response received.";
                container.appendChild(aiDiv);
                container.scrollTop = container.scrollHeight;

                chat.messages.push({ isUser: false, text: aiDiv.textContent });
                saveChats();
            } catch (e) {
                typingDiv.textContent = "❌ Connection error. Please check your internet.";
            }
        }

        function logout() {
            if (confirm("Logout from StudyMate AI?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Initialize
        if (chats.length === 0) newChat();
        else switchChat(chats[0].id);

        renderChatList();

        // Send on Enter
        document.getElementById('question').addEventListener('keypress', e => {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
